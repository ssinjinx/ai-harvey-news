<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{% block title %}HARVEY AI{% endblock %}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "error-container": "#93000a",
        "primary-fixed": "#d7e2ff",
        "tertiary-fixed": "#c3f400",
        "on-tertiary-container": "#222e00",
        "surface-dim": "#0f1419",
        "secondary-container": "#6f00be",
        "outline": "#8b909f",
        "tertiary": "#abd600",
        "on-error-container": "#ffdad6",
        "on-primary-fixed-variant": "#004492",
        "on-tertiary-fixed": "#161e00",
        "secondary-fixed": "#f0dbff",
        "on-tertiary": "#283500",
        "surface-container": "#1b2026",
        "surface-tint": "#acc7ff",
        "inverse-surface": "#dee3eb",
        "surface-bright": "#353a40",
        "on-secondary": "#490080",
        "on-secondary-container": "#d6a9ff",
        "on-primary": "#002f68",
        "surface-container-high": "#252a30",
        "on-primary-container": "#00285b",
        "tertiary-fixed-dim": "#abd600",
        "on-secondary-fixed-variant": "#6900b3",
        "on-tertiary-fixed-variant": "#3c4d00",
        "surface-container-highest": "#30353b",
        "surface-container-lowest": "#0a0f14",
        "background": "#0f1419",
        "on-background": "#dee3eb",
        "inverse-primary": "#005bbf",
        "surface-variant": "#30353b",
        "primary-fixed-dim": "#acc7ff",
        "on-surface": "#dee3eb",
        "surface": "#0f1419",
        "on-error": "#690005",
        "primary-container": "#498fff",
        "tertiary-container": "#7c9c00",
        "on-secondary-fixed": "#2c0051",
        "secondary": "#ddb7ff",
        "error": "#ffb4ab",
        "primary": "#acc7ff",
        "secondary-fixed-dim": "#ddb7ff",
        "outline-variant": "#414754",
        "surface-container-low": "#171c22",
        "inverse-on-surface": "#2c3137",
        "on-surface-variant": "#c1c6d6",
        "on-primary-fixed": "#001a40"
      },
      fontFamily: {
        "headline": ["Space Grotesk"],
        "body": ["Inter"],
        "label": ["Space Grotesk"]
      },
      borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"}
    }
  }
}
</script>
<style>
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
    text-transform: none;
    letter-spacing: normal;
    word-wrap: normal;
    white-space: nowrap;
    direction: ltr;
}
.glass-panel {
    background: rgba(27, 32, 38, 0.7);
    backdrop-filter: blur(20px);
}
.glass-card {
    background: rgba(27, 32, 38, 0.7);
    backdrop-filter: blur(20px);
}
.neon-glow-primary {
    box-shadow: 0 0 15px rgba(172, 199, 255, 0.3);
}
.neon-border-gradient {
    background: linear-gradient(to bottom right, #acc7ff, #6f00be);
    padding: 2px;
}
.asymmetric-pull {
    padding-left: 1.5rem;
    padding-right: 1rem;
}
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #0f1419; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #414754; border-radius: 10px; }
body { min-height: max(884px, 100dvh); }
</style>
{% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30">
{% block body %}{% endblock %}
</body>
</html>
